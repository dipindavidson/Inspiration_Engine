<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contextual Bible Companion</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; }
        h3 { color: #7f8c8d; font-weight: 400; margin-top: 0; font-size: 14px; }
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ccd1d1;
            border-radius: 6px;
            resize: none;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 15px;
        }
        textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        .result-box {
            margin-top: 25px;
            text-align: left;
            min-height: 100px;
        }
        #verse-text { font-style: italic; color: #2c3e50; font-size: 17px; display: block; margin-bottom: 5px; }
        #verse-ref { font-weight: bold; color: #3498db; font-size: 14px; display: block; margin-bottom: 10px; }
        #verse-exp { color: #5d6d7e; font-size: 14px; display: block; line-height: 1.5; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
            width: 100%;
        }
        button:hover { background: #2980b9; }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #7f8c8d;
            border-top: 1px solid #ecf0f1;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Bible Companion</h1>
        <h3>How was your day? What's on your mind?</h3>
        
        <textarea id="user-day" placeholder="e.g., I am feeling really anxious about a deployment tomorrow..."></textarea>
        
        <button onclick="fetchVerse()">Find Reflection</button>
        
        <div class="result-box">
            <span id="verse-text">Your reflection will appear here.</span>
            <span id="verse-ref"></span>
            <span id="verse-exp"></span>
        </div>
        
        <div class="footer">
            Server Pod ID: <strong id="pod-id">N/A (Local Host)</strong>
        </div>
    </div>

    <script>
        function fetchVerse() {
            const userInput = document.getElementById('user-day').value;
            const verseText = document.getElementById('verse-text');
            const verseRef = document.getElementById('verse-ref');
            const verseExp = document.getElementById('verse-exp');
            const podElement = document.getElementById('pod-id');
            
            if (!userInput.trim() || userInput.trim().length < 5) {
                verseText.innerText = "Please type a bit more about your day.";
                verseRef.innerText = "";
                verseExp.innerText = "A short sentence helps find a meaningful context.";
                return;
            }

            verseText.innerText = "Seeking a matching reflection...";
            verseRef.innerText = "";
            verseExp.innerText = "";

            fetch('/api/verse', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: userInput })
            })
            .then(async (response) => {
                // Parse the JSON payload regardless of the HTTP status code status
                let data = {};
                try {
                    data = await response.json();
                } catch (e) {
                    // Fallback if backend didn't return valid JSON
                    if (!response.ok) throw new Error('Server returned an unparsable error status.');
                }

                // If the HTTP status is bad, handle it cleanly with the JSON data if available
                if (!response.ok) {
                    return {
                        error: true,
                        message: data.error?.message || data.error || 'Server returned an error status.'
                    };
                }

                return data;
            })
            .then(data => {
                if (data.error) {
                    verseText.innerText = "Service Notice";
                    verseRef.innerText = "";
                    // This will now dynamically display "This model is currently experiencing high demand..."
                    verseExp.innerText = data.message || data.error; 
                } else {
                    verseText.innerText = `"${data.verse}"`;
                    verseRef.innerText = data.reference;
                    verseExp.innerText = data.explanation;
                    podElement.innerText = data.containerId;
                }
            })
            .catch(error => {
                console.error('Network or Execution Error:', error);
                verseText.innerText = "Connection Issue";
                verseRef.innerText = "";
                verseExp.innerText = "Could not reach the cluster backend engine. Verify your configurations and pod status.";
            });
        }
    </script>

</body>
</html>
